name: Release

on:
  push:
    tags:
      - "v*"
      - "BunnySU-*"

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, ví dụ: BunnySU-R1 hoặc v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build-manager:
    uses: ./.github/workflows/build-manager.yml
    secrets: inherit

  release:
    needs:
      - build-manager
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Rename ksud
        run: |
          mkdir -p ksud

          for dir in ./ksud-*; do
              if [ -d "$dir" ]; then
                 echo "----- Rename $dir -----"
                 ksud_platform_name=$(basename "$dir")

                 find "$dir" -type f -name "ksud" -path "*/release/*" | while read -r ksud_file; do
                   if [ -f "$ksud_file" ]; then
                     echo "Move $ksud_file -> ksud/$ksud_platform_name"
                     mv "$ksud_file" "ksud/$ksud_platform_name"
                   fi
                 done
              fi
          done

      - name: Display structure of downloaded files
        run: |
          echo "Current directory:"
          pwd

          echo "All downloaded files:"
          ls -R

          echo "Possible release files:"
          find . -type f | grep -E "apk|ksud|ko|ksuinit" || true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            manager/*.apk
            android*-lkm/*_kernelsu.ko
            ksud/ksud-*
            ksuinit/**